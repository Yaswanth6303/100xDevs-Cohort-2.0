<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #hv{
            background-color: yellow;
            height: 20px;
            width: 120px;
            padding: 40px;
        }
    </style>
</head>
<body>
    <h1>The Javascript HTML Events</h1>
    <h2>The onmouseover Attribute</h2>

    <div onmouseover="mOver(this)" onmouseout="mOut(this)" id="hv">
        Mouse Over Me
    </div>

    <script>
        function mOver(obj){
            obj.innerHTML = "Thank You."
        }
        function mOut(obj){
            obj.innerHTML ="Mouse Over Me"
        }
    </script>
</body>
</html>
