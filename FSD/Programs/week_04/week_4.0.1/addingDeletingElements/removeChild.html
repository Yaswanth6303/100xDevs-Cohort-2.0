<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>JavaScript HTML DOM</h1>
<p>Remove child element</p>

<div id="div1">
    <p id="p1">I am paragraph 1</p>
    <p id="p2">I am paragraph 2</p>
</div>

<button id="removeButton" onclick="clickRemove()">Click</button>

<script>
    function clickRemove(){
        const parent = document.getElementById("div1");
        const child = document.getElementById('p2');
        parent.removeChild(child);

        // Remove the button
        const button = document.getElementById("removeButton");
        button.style.display = "none";
    }
</script>
</body>
</html>
