<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div{
            border: 2px solid blue;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>The document object</h1>
    <h2>The querySelectorAll() method</h2>

    <p>Change the background color of every p element where the parent is a div element:</p>

    <div>
        <h3>H3 element</h3>
        <p>I am a p element, my parent is a div element.</p>
    </div>

    <div>
        <h3>H2 element</h3>
        <p>I am a p element, my parent is also div element.</p>
    </div>

    <script>
        const nodeList = document.querySelector("div > p")
        nodeList.style.backgroundColor = "green";
        // for (let i = 0; i < nodeList.length; i++){
        //     nodeList[i].style.backgroundColor = "green";
        // }
    </script>
</body>
</html>
