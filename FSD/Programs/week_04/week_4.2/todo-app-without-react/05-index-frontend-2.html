<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo App - Smart Polling</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body>
        <h1>Todo App</h1>
        <div id="container"></div>

        <script>
            function createChild(title, description, id) {
                const child = document.createElement('div');
                child.setAttribute('id', id);

                const firstGrandChild = document.createElement('div');
                firstGrandChild.textContent = title;

                const secondGrandChild = document.createElement('div');
                secondGrandChild.textContent = description;

                const thirdGrandChild = document.createElement('button');
                thirdGrandChild.textContent = 'Mark as done';
                thirdGrandChild.onclick = () => markAsDone(id);

                child.appendChild(firstGrandChild);
                child.appendChild(secondGrandChild);
                child.appendChild(thirdGrandChild);

                return child;
            }

            function updateDomAccToState(state) {
                const parent = document.getElementById('container');
                parent.innerHTML = '';
                state.forEach(todo => {
                    parent.appendChild(createChild(todo.title, todo.description, todo.id));
                });
            }

            async function fetchTodos() {
                try {
                    const response = await axios.get('http://localhost:3000/todos');
                    updateDomAccToState(response.data.todos);
                } catch (err) {
                    console.error('Error fetching todos:', err);
                } finally {
                    // wait 5s, then fetch again
                    setTimeout(fetchTodos, 5000);
                }
            }

            function markAsDone(id) {
                console.log('Marking todo as done:', id);
                // Example: axios.post("http://localhost:3000/todos/markDone", { id });
            }

            // start fetching once
            fetchTodos();
        </script>
    </body>
</html>
